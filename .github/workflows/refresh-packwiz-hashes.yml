name: Refresh Packwiz Hashes

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize line endings and refresh pack hashes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import hashlib
          import re

          root = Path(".")
          files = [
              root / "index-20260627.toml",
              root / "index-main.toml",
              root / "pack.toml",
              root / "pack-20260627.toml",
          ]
          pw_files = sorted((root / "mods").glob("*.pw.toml"))

          for path in files:
              text = path.read_text(encoding="utf-8").replace("\r\n", "\n").replace("\r", "\n")
              path.write_text(text, encoding="utf-8", newline="\n")

          for path in pw_files:
              text = path.read_text(encoding="utf-8").replace("\r\n", "\n").replace("\r", "\n")
              path.write_text(text, encoding="utf-8", newline="\n")

          for index_name in ("index-20260627.toml", "index-main.toml"):
              path = root / index_name
              text = path.read_text(encoding="utf-8")
              for pw_file in pw_files:
                  rel = pw_file.relative_to(root).as_posix()
                  sha = hashlib.sha256(pw_file.read_bytes()).hexdigest()
                  pattern = rf'(file = "{re.escape(rel)}"\nhash = ")[0-9a-f]+(")'
                  text, count = re.subn(pattern, rf"\g<1>{sha}\2", text)
                  if count != 1:
                      raise SystemExit(f"Could not refresh hash for {rel} in {index_name}")
              path.write_text(text, encoding="utf-8", newline="\n")

          index_hash = hashlib.sha256((root / "index-20260627.toml").read_bytes()).hexdigest()
          for pack_name in ("pack.toml", "pack-20260627.toml"):
              path = root / pack_name
              text = path.read_text(encoding="utf-8")
              text = re.sub(r'hash = "[0-9a-f]+"', f'hash = "{index_hash}"', text, count=1)
              path.write_text(text, encoding="utf-8", newline="\n")

          print(f"index hash: {index_hash}")
          PY

      - name: Commit and push if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No hash changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes mods/*.pw.toml index-20260627.toml index-main.toml pack.toml pack-20260627.toml
          git commit -m "Refresh packwiz hashes"
          git push
