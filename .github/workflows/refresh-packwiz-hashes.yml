name: Refresh Packwiz Hashes

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize line endings and refresh pack hashes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import hashlib
          import re

          root = Path(".")
          files = [root / "index-main.toml", root / "pack.toml"]
          entry_re = re.compile(r'\[\[files\]\]\nfile = "([^"]+)"\nhash = "([0-9a-f]+)"')

          index_path = root / "index-main.toml"
          index_text = index_path.read_text(encoding="utf-8")
          indexed_files = [root / rel for rel, _ in entry_re.findall(index_text)]

          for path in files:
              text = path.read_text(encoding="utf-8").replace("\r\n", "\n").replace("\r", "\n")
              path.write_text(text, encoding="utf-8", newline="\n")

          for path in indexed_files:
              if not path.exists():
                  raise SystemExit(f"Indexed file is missing: {path.relative_to(root).as_posix()}")
              if path.suffix not in {".toml", ".md"}:
                  continue
              text = path.read_text(encoding="utf-8").replace("\r\n", "\n").replace("\r", "\n")
              path.write_text(text, encoding="utf-8", newline="\n")

          for index_name in ("index-main.toml",):
              path = root / index_name
              text = path.read_text(encoding="utf-8")
              for file_path in indexed_files:
                  rel = file_path.relative_to(root).as_posix()
                  sha = hashlib.sha256(file_path.read_bytes()).hexdigest()
                  pattern = rf'(file = "{re.escape(rel)}"\nhash = ")[0-9a-f]+(")'
                  text, count = re.subn(pattern, rf"\g<1>{sha}\2", text)
                  if count != 1:
                      raise SystemExit(f"Could not refresh hash for {rel} in {index_name}")
              path.write_text(text, encoding="utf-8", newline="\n")

          index_hash = hashlib.sha256((root / "index-main.toml").read_bytes()).hexdigest()
          for pack_name in ("pack.toml",):
              path = root / pack_name
              text = path.read_text(encoding="utf-8")
              text = re.sub(r'hash = "[0-9a-f]+"', f'hash = "{index_hash}"', text, count=1)
              path.write_text(text, encoding="utf-8", newline="\n")

          print(f"index hash: {index_hash}")
          PY

      - name: Commit and push if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No hash changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes mods/*.pw.toml index-main.toml pack.toml
          git commit -m "Refresh packwiz hashes"
          git push
