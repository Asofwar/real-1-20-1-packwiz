name: Validate Packwiz Metadata

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify packwiz hashes and line endings
        run: python scripts/verify_packwiz_hashes.py

      - name: Validate recipe sanity
        run: python scripts/validate_recipe_sanity.py
